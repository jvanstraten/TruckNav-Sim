name: Build Dev (Manual - Windows & Android)

on:
    workflow_dispatch:

jobs:
    # ---------------------------------------------------------
    # BUILD WINDOWS EXE (ELECTRON)
    # ---------------------------------------------------------
    build-windows:
        runs-on: windows-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install Root Dependencies
              run: npm install

            - name: Build Nuxt Web App
              run: |
                  npx nuxi build
                  npx nuxi generate

            - name: Build Windows EXE
              run: |
                  cd electron
                  npm install
                  npm run electron:make -- --win

            - name: Upload Windows EXE to GitHub
              uses: actions/upload-artifact@v4
              with:
                  name: TruckNav-Windows-Dev
                  path: electron/dist/*.exe

    # ---------------------------------------------------------
    # BUILD ANDROID APK (CAPACITOR)
    # ---------------------------------------------------------
    build-android:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"

            - name: Install Root Dependencies
              run: npm install

            - name: Build Nuxt Web App
              run: |
                  npx nuxi build
                  npx nuxi generate

            - name: Sync Capacitor Android
              run: |
                  npm install @capacitor/android
                  npx cap add android || true
                  npx cap sync android

            - name: Build Android APK
              run: |
                  cd android
                  chmod +x gradlew
                  ./gradlew assembleDebug

            - name: Upload Android APK to GitHub
              uses: actions/upload-artifact@v4
              with:
                  name: TruckNav-Android-Dev
                  path: android/app/build/outputs/apk/debug/app-debug.apk
