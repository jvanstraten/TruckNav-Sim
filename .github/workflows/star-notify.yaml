name: Star Notification
on:
    watch:
        types: [started]
    workflow_dispatch:

jobs:
    discord_notify:
        runs-on: ubuntu-latest
        steps:
            - name: Send custom Discord message
              run: |
                  curl -H "Content-Type: application/json" \
                  -X POST \
                  -d '{
                    "username": "TruckNav Milestones",
                    "avatar_url": "https://raw.githubusercontent.com/Rares-Muntean/TruckNav-Sim/master/public/icon.png",
                    "embeds": [{
                      "title": "🚛 New Star! 🚛",
                      "description": "## **${{ github.actor }}** just joined the convoy! \n\nThank you for supporting **TruckNav-Sim**!",
                      "color": 3447003,
                      "thumbnail": { "url": "${{ github.event.sender.avatar_url }}" },
                      "footer": { "text": "New hauling milestone reached!" }
                    }]
                  }' \
                  ${{ secrets.DISCORD_WEBHOOK }}
